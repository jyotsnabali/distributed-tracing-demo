name: Build and deploy Integration API to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build IntegrationApi
        run: dotnet build --configuration Release
        working-directory: IntegrationApi

      - name: Publish IntegrationApi
        run: dotnet publish -c Release -o ./publish
        working-directory: IntegrationApi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: integrationapi-artifact
          path: IntegrationApi/publish

  deploy:
    runs-on: windows-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: integrationapi-artifact

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'FRONTEND-APP-NAME'
          slot-name: 'Production'
          package: FrontendApi/publish
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FRONTEND }} }}
